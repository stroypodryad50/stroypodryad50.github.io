<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку | СтройПодряд</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fef9f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .icon { font-size: 70px; color: #e67e22; margin-bottom: 20px; }
        h1 { margin-bottom: 15px; color: #1e4660; }
        p { margin-bottom: 25px; color: #4a5568; line-height: 1.6; }
        .btn { display: inline-block; background: #e67e22; color: white; padding: 12px 28px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .btn:hover { background: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>Спасибо за заявку!</h1>
        <p>Мы получили ваше сообщение и свяжемся с вами в ближайшее время.</p>
        <a href="index.html" class="btn">Вернуться на главную</a>
    </div>
</body>
</html>
